<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成塔防 (Merge Tower Defense)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../assets/css/leaderboard-system.css">
</head>
<body>

<div id="game-container">
    <!-- 1. 頂部固定資訊條 -->
    <div id="top-bar">
        <div class="top-bar-row">
            <div class="info-item">
                <span>🏆</span>
                <span id="val-score">0</span>
            </div>
            <div class="info-item">
                <span>💰</span>
                <span id="val-coins">150</span>
            </div>
            <div class="info-item">
                <span>🏰</span>
                <div class="hp-container">
                    <div id="hp-bar-inner" class="hp-bar"></div>
                </div>
            </div>
        </div>
        <div class="top-bar-row">
            <div class="info-item">
                <span>🌊</span>
                <span id="val-wave">1</span>
            </div>
            <button id="btn-start-wave" class="btn-top-action">▶️ 下一波</button>
            <button id="btn-pause" class="btn-pause-icon" aria-label="Pause">⏸️</button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="game-toast">提示訊息</div>

    <!-- 暫停覆蓋層 -->
    <div id="pause-overlay">
        <div class="pause-content">
            <h2>遊戲暫停</h2>
            <button id="btn-resume" class="btn-game btn-summon">▶️ 繼續遊戲</button>
        </div>
    </div>

        <!-- 2. 中間 Canvas 遊戲區域 (包含上地圖、下合成區) -->
    <div id="canvas-wrapper">
        <canvas id="game-canvas"></canvas>
        <canvas id="drag-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100;"></canvas>
        
        <!-- 側邊動作按鈕區 -->
        <div id="side-action-buttons">
            <button id="btn-delete" class="btn-game btn-delete">
                <span>🕳️<br>回收</span>
            </button>
            <button id="btn-summon" class="btn-game btn-summon">
                <span>✨<br>召喚<br>(<span id="summon-cost">50</span>)</span>
            </button>
        </div>
    </div>
</div>

<!-- 排行榜 SDK & Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="../../assets/js/firebase-config.js"></script>
<script src="../../assets/js/leaderboard-system.js"></script>

<!-- 遊戲核心與渲染 Engine -->
<script src="merge-td-core.js?v=27"></script>
<script src="merge-td-render.js?v=27"></script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // 初始化 Leaderboard System
        const leaderboard = new LeaderboardSystem({
            gameId: 'merge-td',
            gameName: '合成塔防',
            title: '🛡️ 塔防榮譽榜',
            scoreUnit: '分',
            theme: 'dark',
            firebaseConfig: window.firebaseConfig || null
        });

        // 初始化遊戲核心與渲染
        const canvas = document.getElementById('game-canvas');
        const core = new MergeTDCore();
        const render = new MergeTDRender(canvas, core, leaderboard);
        
        // 為了 debug 方便暴露到 window
        window.gameCore = core;
        window.renderCore = render;
    });
</script>

</body>
</html>
