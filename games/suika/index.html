<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suika Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 700px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 30px 40px -10px rgba(100, 50, 0, 0.5);
            border-radius: 20px;
            box-sizing: border-box;
            background-color: #FDF1D9; /* Light wooden/cardboard base */
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255,255,255,0.6) 0%, transparent 60%),
                linear-gradient(to bottom, transparent 0%, rgba(139, 69, 19, 0.15) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(200, 150, 100, 0.1) 18px, rgba(200, 150, 100, 0.1) 20px),
                repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(200, 150, 100, 0.1) 18px, rgba(200, 150, 100, 0.1) 20px);
            border: 12px solid #D29A5A; /* Wooden frame border */
            border-bottom: 16px solid #B87B3E; /* Thicker bottom border */
            border-top: 8px solid #E6B579;
            position: relative;
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/leaderboard-system.css">
</head>
<body>

<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<!-- Firebase SDK (全網線上排行榜用) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="../../assets/js/firebase-config.js"></script>

<script src="../../assets/js/leaderboard-system.js"></script>
<script src="../../assets/js/merge-game-core.js"></script>
<script src="suika-game.js"></script>
<script>
    const suikaConfig = {
        gameId: "suika",
        gameName: "合成大西瓜",
        leaderboardTitle: "🍉 瓜農榮譽榜",
        scoreUnit: "分",
        firebaseConfig: (typeof GLOBAL_FIREBASE_CONFIG !== 'undefined' && GLOBAL_FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") ? GLOBAL_FIREBASE_CONFIG : null,
        theme: {
            background: "transparent",
            wallColor: "#E2B881",
            dangerLineColor: "#FF5252"
        },
        physics: {
            frictionAir: 0.01,   // 下落時空氣阻力小 (果凍感)
            dropVelocity: 15     // 下落初速大
        },
        items: [
            { name: "Cherry", radius: 15, color: "#F9114E66", mass: 1, emoji: "🍒" },
            { name: "Strawberry", radius: 22, color: "#F42E3566", mass: 1.5, emoji: "🍓" },
            { name: "Grape", radius: 30, color: "#A657A666", mass: 2, emoji: "🍇" },
            { name: "Dekopon", radius: 40, color: "#FCA00166", mass: 2.5, emoji: "🍊" },
            { name: "Orange", radius: 52, color: "#FA8C0066", mass: 3, emoji: "🍋" }, /* Using lemon as orange is Dekopon */
            { name: "Apple", radius: 65, color: "#ED182666", mass: 3.5, emoji: "🍎" },
            { name: "Pear", radius: 80, color: "#D9D25F66", mass: 4, emoji: "🍐" },
            { name: "Peach", radius: 95, color: "#F8B4C466", mass: 4.5, emoji: "🍑" },
            { name: "Pineapple", radius: 110, color: "#FBEA1866", mass: 5, emoji: "🍍" },
            { name: "Melon", radius: 130, color: "#91CF4266", mass: 5.5, emoji: "🍈" },
            { name: "Watermelon", radius: 155, color: "#23891466", mass: 6, emoji: "🍉" }
        ],
        obstacles: [
            { name: "Stone", radius: 25, color: "#888888", emoji: "🪨", mass: 8 }
        ],
        levels: [
            { targetItemIndex: 3, targetCount: 1, obstacleProb: 0 },    // Lv.1: Dekopon 🍊 x1
            { targetItemIndex: 4, targetCount: 1, obstacleProb: 0 },    // Lv.2: Orange 🍋 x1
            { targetItemIndex: 5, targetCount: 1, obstacleProb: 0 },    // Lv.3: Apple 🍎 x1
            { targetItemIndex: 6, targetCount: 1, obstacleProb: 0 },    // Lv.4: Pear 🍐 x1
            { targetItemIndex: 7, targetCount: 1, obstacleProb: 0 },    // Lv.5: Peach 🍑 x1
            { targetItemIndex: 8, targetCount: 1, obstacleProb: 0 },    // Lv.6: Pineapple 🍍 x1
            { targetItemIndex: 9, targetCount: 1, obstacleProb: 0 },    // Lv.7: Melon 🍈 x1
            { targetItemIndex: 10, targetCount: 1, obstacleProb: 0 },   // Lv.8: Watermelon 🍉 x1
            
            // Post-Watermelon levels
            { targetItemIndex: 6, targetCount: 3, obstacleProb: 0.05 }, // Lv.9: Pear 🍐 x3 (5% obstacle)
            { targetItemIndex: 7, targetCount: 3, obstacleProb: 0.08 }, // Lv.10: Peach 🍑 x3 (8% obstacle)
            { targetItemIndex: 8, targetCount: 2, obstacleProb: 0.12 }, // Lv.11: Pineapple 🍍 x2 (12% obstacle)
            { targetItemIndex: 9, targetCount: 2, obstacleProb: 0.15 }, // Lv.12: Melon 🍈 x2 (15% obstacle)
            { targetItemIndex: 10, targetCount: 2, obstacleProb: 0.20 } // Lv.13: Watermelon 🍉 x2 (20% obstacle)
        ]
    };

    window.onload = () => {
        new SuikaGame('game-container', suikaConfig);
    };
</script>
</body>
</html>
