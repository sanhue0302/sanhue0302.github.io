<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suika Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 700px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #FFF1DB 0%, #FFD185 100%);
            position: relative;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="../../assets/js/merge-game-core.js"></script>
<script>
    const suikaConfig = {
        theme: {
            background: "transparent",
            wallColor: "#E2B881",
            dangerLineColor: "#FF5252"
        },
        items: [
            { name: "Cherry", radius: 15, color: "#F9114E", mass: 1 },
            { name: "Strawberry", radius: 22, color: "#F42E35", mass: 1.5 },
            { name: "Grape", radius: 30, color: "#A657A6", mass: 2 },
            { name: "Dekopon", radius: 40, color: "#FCA001", mass: 2.5 },
            { name: "Orange", radius: 52, color: "#FA8C00", mass: 3 },
            { name: "Apple", radius: 65, color: "#ED1826", mass: 3.5 },
            { name: "Pear", radius: 80, color: "#D9D25F", mass: 4 },
            { name: "Peach", radius: 95, color: "#F8B4C4", mass: 4.5 },
            { name: "Pineapple", radius: 110, color: "#FBEA18", mass: 5 },
            { name: "Melon", radius: 130, color: "#91CF42", mass: 5.5 },
            { name: "Watermelon", radius: 155, color: "#238914", mass: 6 }
        ]
    };

    window.onload = () => {
        new MergeGame('game-container', suikaConfig);
    };
</script>
</body>
</html>
