<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark tech room -->
  <rect width="800" height="400" fill="#0b0c10" />

  <!-- Server Racks Background -->
  <!-- Left Rack -->
  <rect x="50" y="50" width="120" height="350" fill="#1f2833" stroke="#45a29e" stroke-width="2" />
  <rect x="60" y="70" width="100" height="20" fill="#0b0c10" />
  <circle cx="70" cy="80" r="3" fill="#66fcf1" filter="url(#neon)" />
  <circle cx="85" cy="80" r="3" fill="#66fcf1" />
  <rect x="60" y="110" width="100" height="20" fill="#0b0c10" />
  <circle cx="70" cy="120" r="3" fill="#66fcf1" filter="url(#neon)" />
  <circle cx="140" cy="120" r="3" fill="#ff003c" filter="url(#neon)" />
  <rect x="60" y="150" width="100" height="20" fill="#0b0c10" />
  
  <!-- Right Rack -->
  <rect x="630" y="50" width="120" height="350" fill="#1f2833" stroke="#45a29e" stroke-width="2" />
  <rect x="640" y="150" width="100" height="20" fill="#0b0c10" />
  <circle cx="650" cy="160" r="3" fill="#66fcf1" filter="url(#neon)" />
  <rect x="640" y="210" width="100" height="20" fill="#0b0c10" />
  <circle cx="650" cy="220" r="3" fill="#ff003c" filter="url(#neon)" />
  <circle cx="665" cy="220" r="3" fill="#66fcf1" filter="url(#neon)" />
  <rect x="640" y="270" width="100" height="20" fill="#0b0c10" />
  
  <!-- Holographic Map / Global Expansion Center -->
  <ellipse cx="400" cy="220" rx="150" ry="80" fill="none" stroke="#66fcf1" stroke-width="2" opacity="0.3" />
  <ellipse cx="400" cy="220" rx="150" ry="80" fill="none" stroke="#66fcf1" stroke-width="4" stroke-dasharray="10 20" filter="url(#neon)" opacity="0.6" />
  <ellipse cx="400" cy="220" rx="130" ry="60" fill="none" stroke="#45a29e" stroke-width="1" opacity="0.4" />
  
  <!-- Nodes on the map -->
  <circle cx="350" cy="200" r="5" fill="#ff003c" filter="url(#neon)" />
  <circle cx="480" cy="230" r="4" fill="#66fcf1" filter="url(#neon)" />
  <circle cx="320" cy="250" r="3" fill="#66fcf1" filter="url(#neon)" />
  <circle cx="420" cy="180" r="6" fill="#ff003c" filter="url(#neon)" />
  
  <!-- Connecting lines -->
  <path d="M 350 200 L 480 230 M 350 200 L 320 250 M 350 200 L 420 180" stroke="#45a29e" stroke-width="2" opacity="0.6" />

  <!-- Base Grid / Floor -->
  <path d="M 0 350 L 800 350 M 0 370 L 800 370 M 0 390 L 800 390" stroke="#1f2833" stroke-width="2" />
  <path d="M 200 400 L 400 220 L 600 400 M 100 400 L 400 220 L 700 400" stroke="#1f2833" stroke-width="2" opacity="0.5" />

</svg>
