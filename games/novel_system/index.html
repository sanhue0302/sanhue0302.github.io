<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>多故事選單互動小說遊戲 (Monogatari 核心)</title>
  <meta name="description" content="基於 Monogatari v2 核心引擎打造的模組化多故事分支互動小說遊戲，支援大廳故事選單、立繪微表情動畫與 CG 回憶畫廊。" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/monogatari.css" />
  <link rel="stylesheet" href="css/custom-theme.css" />
</head>
<body>

  <div id="game-wrapper">

    <!-- 1. 故事選擇大廳 (Story Selector Lobby Screen) -->
    <div id="lobby-screen">
      <header class="lobby-header">
        <h1>多故事互動小說大廳</h1>
        <p>選擇您想體驗的故事擴充包，開啟心動的分支冒險</p>
        <div class="header-actions">
          <button id="btn-gallery-open" class="gallery-btn">
            🖼️ 回憶 (CG) 畫廊
          </button>
        </div>
      </header>

      <!-- Dynamic Story Cards Container -->
      <div id="story-grid" class="story-grid">
        <!-- Generated by main.js -->
      </div>
    </div>

    <!-- 2. Monogatari 小說劇舞台容器 -->
    <div id="monogatari">
      <!-- 背景場景圖層 -->
      <div id="scene-background"></div>

      <!-- 角色立繪圖層 -->
      <div id="character-container"></div>

      <!-- 對話框容器 -->
      <div id="textbox-container">
        <div id="textbox">
          <div id="speaker-badge" class="narrator">旁白</div>
          <div id="dialogue-text">載入中...</div>

          <!-- 快選選單 (Quick Menu) -->
          <div id="quick-menu">
            <button id="btn-auto" class="quick-btn">AUTO 自動</button>
            <button id="btn-skip" class="quick-btn">SKIP 快進</button>
            <button id="btn-history" class="quick-btn">LOG 履歷</button>
            <button id="btn-save" class="quick-btn">💾 存檔</button>
            <button id="btn-load" class="quick-btn">📂 讀檔</button>
            <button id="btn-settings" class="quick-btn">⚙️ 設定</button>
            <button id="btn-back-lobby" class="quick-btn">🏠 返回大廳</button>
          </div>
        </div>
      </div>

      <!-- 劇情選項容器 -->
      <div id="choice-container"></div>
    </div>

    <!-- 3. 回憶畫廊 Modal (Memory Gallery Modal) -->
    <div id="gallery-modal" class="hidden">
      <div class="modal-header">
        <h2 class="modal-title">✨ 回憶 (CG) 畫廊</h2>
        <button id="btn-gallery-close" class="close-btn">&times;</button>
      </div>
      <div id="gallery-grid" class="gallery-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>

    <!-- 4. 對話履歷 Modal (Dialogue History Log) -->
    <div id="history-modal" class="hidden">
      <div class="modal-header">
        <h2 class="modal-title">📜 對話歷史履歷</h2>
        <button id="btn-history-close" class="close-btn">&times;</button>
      </div>
      <div id="history-content" class="history-content">
        <!-- Rendered dynamically -->
      </div>
    </div>

    <!-- 5. 存讀檔 Modal (Save / Load Slot Modal) -->
    <div id="save-load-modal" class="hidden">
      <div class="modal-header">
        <h2 id="save-load-title" class="modal-title">💾 遊戲存檔與讀檔</h2>
        <button id="btn-saveload-close" class="close-btn">&times;</button>
      </div>
      <div id="save-slots-grid" class="save-slots-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>

    <!-- 6. 系統設定 Modal (Settings Modal) -->
    <div id="settings-modal" class="hidden">
      <div class="modal-header">
        <h2 class="modal-title">⚙️ 系統設定</h2>
        <button id="btn-settings-close" class="close-btn">&times;</button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label>打字顯示速度</label>
          <input type="range" id="setting-text-speed" min="5" max="60" value="25" step="5" />
          <span id="label-text-speed">標準 (25ms)</span>
        </div>
        <div class="setting-item">
          <label>自動播放等待間隔</label>
          <input type="range" id="setting-auto-speed" min="1000" max="4000" value="2000" step="500" />
          <span id="label-auto-speed">2.0 秒</span>
        </div>
        <div class="setting-item">
          <label>系統音效音量</label>
          <input type="range" id="setting-sfx-vol" min="0" max="100" value="100" />
          <span id="label-sfx-vol">100%</span>
        </div>

        <div id="setting-player-name-group" class="hidden">
          <div class="setting-group-title">👤 主角名稱設定 (本故事支援)</div>
          <div class="setting-item">
            <label>主角全名 / 姓名</label>
            <input type="text" id="setting-player-name" class="setting-text-input" placeholder="請輸入姓名 (預設: 陽太)" />
          </div>
          <div class="setting-item">
            <label>主角小名 / 暱稱</label>
            <input type="text" id="setting-player-nickname" class="setting-text-input" placeholder="請輸入暱稱 (預設: 阿陽)" />
          </div>
        </div>
      </div>
    </div>

    <!-- 7. 章節通關結算 Modal (End Chapter Settlement Modal) -->
    <div id="ending-modal" class="hidden">
      <div class="ending-card">
        <div class="ending-icon">🎉</div>
        <h2 id="ending-title" class="ending-title">章節通關完成</h2>
        <p id="ending-desc" class="ending-desc">恭喜完成本章節劇本！獲得的心動與解鎖記憶已存入回憶畫廊。</p>
        <button id="btn-ending-confirm" class="ending-btn">返回故事大廳</button>
      </div>
    </div>

    <!-- 8. 劇情對話輸入引導 Modal (In-Game Input Prompt Modal) -->
    <div id="input-modal" class="hidden">
      <div class="input-card">
        <h3 id="input-prompt-text" class="input-prompt-text">請輸入主角名稱：</h3>
        <input type="text" id="input-prompt-field" class="input-prompt-field" autocomplete="off" />
        <p id="input-prompt-warning" class="input-prompt-warning hidden">請輸入有效的名稱！</p>
        <div class="input-actions">
          <button id="btn-input-skip" class="input-btn btn-secondary">使用預設值</button>
          <button id="btn-input-submit" class="input-btn btn-primary">確定</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/monogatari.js"></script>
  <script src="js/live2d-manager.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
