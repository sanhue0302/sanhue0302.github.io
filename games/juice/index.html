<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juice Merge</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #E0F7FA;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 700px;
            /* 3D Track Background */
            background: linear-gradient(to top, #4DD0E1 0%, #0097A7 100%);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="../../assets/js/merge-game-core.js"></script>
<script src="../../assets/js/juice-game.js"></script>
<script>
    const juiceConfig = {
        theme: {
            background: "transparent", // handled by CSS now
            wallColor: "rgba(255, 255, 255, 0)", // Invisible physical walls
            dangerLineColor: "#FF5252",
            invertGravity: true,
            pseudo3D: true
        },
        physics: {
            frictionAir: 0.06,   // 桌面的滑動阻力較大 (空氣阻力代替)
            dropVelocity: 6      // 在桌面上滑出的初始推力較小，顯得杯子比較重
        },
        items: [
            { name: "Small Shot", radius: 15, color: "#E1F5FE", mass: 1 },
            { name: "Paper Cup", radius: 22, color: "#FFF9C4", mass: 1.5 },
            { name: "Tea Cup", radius: 30, color: "#DCEDC8", mass: 2 },
            { name: "Coffee Mug", radius: 40, color: "#FFE0B2", mass: 2.5 },
            { name: "Soda Can", radius: 52, color: "#FFCCBC", mass: 3 },
            { name: "Tall Glass", radius: 65, color: "#F8BBD0", mass: 3.5 },
            { name: "Pint Glass", radius: 80, color: "#E1BEE7", mass: 4 },
            { name: "Boba Cup", radius: 95, color: "#C5E1A5", mass: 4.5 },
            { name: "Pitcher", radius: 110, color: "#FFD54F", mass: 5 },
            { name: "Drink Keg", radius: 130, color: "#FF8A65", mass: 5.5 },
            { name: "Giant Barrel", radius: 155, color: "#FF5252", mass: 6 }
        ]
    };

    window.onload = () => {
        new JuiceGame('game-container', juiceConfig);
    };
</script>
</body>
</html>
