<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>弓箭手射擊遊戲</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 20px;
      background: #eef2f3;
    }
    canvas {
      background: #a0d8f7;
      border: 2px solid #333;
      display: block;
      margin: 10px auto;
      max-width: 100%;
      touch-action: none;
    }
    #startBtn, #restartBtn {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background: #4caf50;
      color: white;
      margin-top: 10px;
    }
    #restartBtn {
      background: #f44336;
    }
    #info {
      font-size: 20px;
      margin: 10px;
    }
    #orientationWarning {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      color: white;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 24px;
      flex-direction: column;
    }
    .rotate-icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: rotateAnim 2s infinite ease-in-out;
    }
    @keyframes rotateAnim {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <div id="orientationWarning">
    <div class="rotate-icon">📱</div>
    <div>請旋轉裝置為橫向模式以進行遊戲</div>
  </div>
  <h1>弓箭手射擊遊戲</h1>
  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <div id="info">時間: 60 秒｜分數: 0</div>
  <button id="startBtn">開始遊戲</button>
  <button id="restartBtn" style="display:none;">重新開始</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const info = document.getElementById('info');
    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    let gameRunning = false;
    let score = 0;
    let timeLeft = 60; // 秒
    let timerId;
    let isPaused = false;
    let isDragging = false;

    const archerX = 50;
    const archerY = HEIGHT - 100;

    const gravity = 0.5;
    let arrow = null;
    let enemy = null;

    let mouseX = archerX + 100;
    let mouseY = archerY;

    const maxPullDistance = 70;
    const ARROW_LENGTH = 120;

    function updateMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
      mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
    }

    canvas.addEventListener('pointerdown', (e) => {
      if(!gameRunning || isPaused) return;
      if(arrow === null){
        isDragging = true;
        updateMousePos(e);
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if(!gameRunning || isPaused) return;
      if(isDragging){
        updateMousePos(e);
      }
    });

    window.addEventListener('pointerup', (e) => {
      if(!gameRunning || isPaused) return;
      if(isDragging && arrow === null){
        shootArrow();
      }
      isDragging = false;
    });

    function checkOrientation() {
      const warning = document.getElementById('orientationWarning');
      if (window.innerHeight > window.innerWidth) {
        warning.style.display = 'flex';
        isPaused = true;
      } else {
        warning.style.display = 'none';
        isPaused = false;
      }
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    checkOrientation();

    function shootArrow(){
      const shoulderX = archerX;
      const shoulderY = archerY - 20;
      const ARM_LENGTH = 30;
      const bowGripX_local = ARM_LENGTH;
      const STRING_OFFSET_X = 5;
      const stringPlaneX_local = bowGripX_local - STRING_OFFSET_X;

      const angle = Math.atan2(mouseY - shoulderY, mouseX - shoulderX);
      
      const handOnBowX_global = shoulderX + bowGripX_local * Math.cos(angle);
      const handOnBowY_global = shoulderY + bowGripX_local * Math.sin(angle);

      const dx = mouseX - handOnBowX_global;
      const dy = mouseY - handOnBowY_global;
      const dist = Math.min(maxPullDistance, Math.hypot(dx, dy));
      
      const nockPointX_global = shoulderX + (stringPlaneX_local - dist) * Math.cos(angle);
      const nockPointY_global = shoulderY + (stringPlaneX_local - dist) * Math.sin(angle);

      const speed = 8 + (dist / maxPullDistance) * 12;
      arrow = {
        x: nockPointX_global,
        y: nockPointY_global,
        vx: speed * Math.cos(angle),
        vy: speed * Math.sin(angle),
        angle: angle,
        pull: dist
      };
    }

    function spawnEnemy() {
      const enemyRadius = 20;
      const minDistanceFromArcher = 300;

      const minX = archerX + minDistanceFromArcher;
      const maxX = WIDTH - enemyRadius;
      const spawnableWidth = maxX - minX;
      const enemyX = Math.random() * spawnableWidth + minX;

      const minY = 50;
      const maxY = HEIGHT - 100;
      const spawnableHeight = maxY - minY;
      const enemyY = Math.random() * spawnableHeight + minY;

      enemy = {x: enemyX, y: enemyY, radius: enemyRadius};
    }

    function updateInfo(){
      info.textContent = `時間: ${timeLeft} 秒 ｜ 分數: ${score}`;
    }

    function gameLoop(){
      ctx.clearRect(0, 0, WIDTH, HEIGHT);

      drawArcher();

      if(enemy){
        drawEnemy(enemy.x, enemy.y);
      }

      if(arrow){
        if(!isPaused) {
          arrow.vy += gravity * 0.1;
          arrow.x += arrow.vx;
          arrow.y += arrow.vy;
          arrow.angle = Math.atan2(arrow.vy, arrow.vx);
        }

        drawArrow(arrow.x, arrow.y, arrow.angle, arrow.pull);

        const arrowTipX = arrow.x + ARROW_LENGTH * Math.cos(arrow.angle);
        const arrowTipY = arrow.y + ARROW_LENGTH * Math.sin(arrow.angle);

        if(!isPaused && enemy && distance(arrowTipX, arrowTipY, enemy.x, enemy.y) < enemy.radius){
          score++;
          arrow = null;
          spawnEnemy();
          updateInfo();
        }

        if(!isPaused && arrow && (arrow.x < 0 || arrow.x > WIDTH || arrow.y > HEIGHT)){
          arrow = null;
        }
      } 

      if(gameRunning && !arrow && isDragging){
        drawAimingAssist();
      }

      if(gameRunning){
        requestAnimationFrame(gameLoop);
      }
    }
    
    function drawAimingAssist(){
        const shoulderX = archerX;
        const shoulderY = archerY - 20;
        const ARM_LENGTH = 30;
        const bowGripX_local = ARM_LENGTH;
        const STRING_OFFSET_X = 5;
        const stringPlaneX_local = bowGripX_local - STRING_OFFSET_X;

        const angle = Math.atan2(mouseY - shoulderY, mouseX - shoulderX);

        const handOnBowX_global = shoulderX + bowGripX_local * Math.cos(angle);
        const handOnBowY_global = shoulderY + bowGripX_local * Math.sin(angle);

        const dx = mouseX - handOnBowX_global;
        const dy = mouseY - handOnBowY_global;
        const dist = Math.min(maxPullDistance, Math.hypot(dx, dy));

        const nockPointX_global = shoulderX + (stringPlaneX_local - dist) * Math.cos(angle);
        const nockPointY_global = shoulderY + (stringPlaneX_local - dist) * Math.sin(angle);

        drawArrow(nockPointX_global, nockPointY_global, angle, dist);

        // Draw trajectory path
        ctx.save();
        ctx.strokeStyle = 'rgba(231, 76, 60, 0.8)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();

        let simX = nockPointX_global;
        let simY = nockPointY_global;
        const speed = 8 + (dist / maxPullDistance) * 12;
        let simVx = speed * Math.cos(angle);
        let simVy = speed * Math.sin(angle);

        ctx.moveTo(simX, simY);

        for (let i = 0; i < 40; i++) {
          simVy += gravity * 0.1;
          simX += simVx;
          simY += simVy;

          ctx.lineTo(simX, simY);

          if (simX < 0 || simX > WIDTH || simY > HEIGHT) {
            break;
          }
        }
        ctx.stroke();
        ctx.restore();
    }

    function drawArcher() {
        const skinColor = '#f1c27d';
        const tunicColor = '#27ae60';
        const capeColor = '#c0392b';
        const bowColor = '#d35400';
        const pantsColor = '#2c3e50';
        
        const shoulderX = archerX;
        const shoulderY = archerY - 20;
        const ARM_LENGTH = 35;

        // --- Calculations ---
        const angle = Math.atan2(mouseY - shoulderY, mouseX - shoulderX);
        const bowGripGlobalX = shoulderX + ARM_LENGTH * Math.cos(angle);
        const bowGripGlobalY = shoulderY + ARM_LENGTH * Math.sin(angle);
        const dx = mouseX - bowGripGlobalX;
        const dy = mouseY - bowGripGlobalY;
        const dist = (isDragging && arrow === null) ? Math.min(maxPullDistance, Math.hypot(dx, dy)) : 0;
        const pullX = bowGripGlobalX - dist * Math.cos(angle);
        const pullY = bowGripGlobalY - dist * Math.sin(angle);

        ctx.save();

        // 1. Cape (flowing behind)
        ctx.fillStyle = capeColor;
        ctx.beginPath();
        ctx.moveTo(archerX - 10, archerY - 25);
        ctx.quadraticCurveTo(archerX - 40, archerY - 10, archerX - 35, archerY + 30);
        ctx.lineTo(archerX - 25, archerY + 35);
        ctx.quadraticCurveTo(archerX - 15, archerY + 10, archerX - 5, archerY - 20);
        ctx.fill();

        // 2. Back Arm (Right Arm - pulling string)
        const midX = archerX + (pullX - archerX)/2;
        const midY = shoulderY + (pullY - shoulderY)/2;
        const armAngle = Math.atan2(pullY - shoulderY, pullX - archerX);
        const elbowX = midX + 15 * Math.sin(armAngle);
        const elbowY = midY - 15 * Math.cos(armAngle);
        
        ctx.strokeStyle = skinColor;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(archerX, shoulderY); 
        ctx.lineTo(elbowX, elbowY);
        ctx.lineTo(pullX, pullY);
        ctx.stroke();
        
        // Back Sleeve
        ctx.strokeStyle = tunicColor;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(archerX, shoulderY);
        ctx.lineTo(elbowX, elbowY);
        ctx.stroke();

        // 3. Back Leg
        ctx.strokeStyle = pantsColor;
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.moveTo(archerX - 5, archerY + 10);
        ctx.lineTo(archerX - 25, archerY + 60); 
        ctx.stroke();
        
        // 4. Quiver & Arrows
        ctx.fillStyle = '#8e44ad';
        ctx.save();
        ctx.translate(archerX - 15, archerY - 10);
        ctx.rotate(-Math.PI / 6);
        ctx.fillRect(-8, -20, 16, 40);
        ctx.fillStyle = 'white';
        ctx.fillRect(-6, -30, 4, 10);
        ctx.fillRect(2, -32, 4, 12);
        ctx.restore();

        // 5. Torso
        ctx.lineWidth = 26;
        ctx.strokeStyle = tunicColor;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(archerX, archerY - 20);
        ctx.lineTo(archerX, archerY + 10);
        ctx.stroke();
        
        // Belt
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(archerX - 13, archerY + 5);
        ctx.lineTo(archerX + 13, archerY + 5);
        ctx.stroke();

        // 6. Front Leg
        ctx.strokeStyle = pantsColor;
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.moveTo(archerX + 5, archerY + 10);
        ctx.lineTo(archerX + 25, archerY + 60);
        ctx.stroke();
        
        // Shoes
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(archerX - 28, archerY + 60, 6, 0, Math.PI*2);
        ctx.arc(archerX + 28, archerY + 60, 6, 0, Math.PI*2);
        ctx.fill();

        // 7. Head & Headband
        // Neck
        ctx.strokeStyle = skinColor;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(archerX, archerY - 20);
        ctx.lineTo(archerX, archerY - 35);
        ctx.stroke();
        // Face
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(archerX, archerY - 45, 14, 0, Math.PI * 2);
        ctx.fill();
        // Eye
        ctx.fillStyle = '#000';
        ctx.beginPath();
        const eyeX = archerX + 6 * Math.cos(angle);
        const eyeY = archerY - 48 + 6 * Math.sin(angle);
        ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI * 2);
        ctx.fill();
        // Headband
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(archerX - 14, archerY - 52);
        ctx.lineTo(archerX + 14, archerY - 48);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(archerX - 13, archerY - 50);
        ctx.lineTo(archerX - 25, archerY - 45);
        ctx.moveTo(archerX - 13, archerY - 50);
        ctx.lineTo(archerX - 22, archerY - 55);
        ctx.stroke();

        // 8. Front Arm (Left Arm)
        ctx.strokeStyle = skinColor;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(archerX, shoulderY);
        ctx.lineTo(bowGripGlobalX, bowGripGlobalY);
        ctx.stroke();
        // Front Sleeve
        ctx.strokeStyle = tunicColor;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(archerX, shoulderY);
        ctx.lineTo(archerX + (bowGripGlobalX - archerX)*0.55, shoulderY + (bowGripGlobalY - shoulderY)*0.55);
        ctx.stroke();

        // 9. Bow Assembly (Rotated)
        ctx.save();
        ctx.translate(shoulderX, shoulderY);
        ctx.rotate(angle);

        const bowGripX = ARM_LENGTH;
        const handY = 0;
        const bowTipY = 65; 

        // Main Bow stick with dynamic bending
        const maxBend = 25;
        const bendAmount = (dist / maxPullDistance) * maxBend;
        
        ctx.strokeStyle = bowColor;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(bowGripX, -bowTipY);
        ctx.bezierCurveTo(
            bowGripX + 15 - bendAmount, -bowTipY / 2, 
            bowGripX + 15 - bendAmount, bowTipY / 2, 
            bowGripX, bowTipY
        );
        ctx.stroke();

        // Bow handle wrap
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(bowGripX + 11 - bendAmount/2, -10);
        ctx.lineTo(bowGripX + 11 - bendAmount/2, 10);
        ctx.stroke();

        const stringPlaneX = bowGripX - 2;

        // Draw Bowstring
        ctx.strokeStyle = '#ecf0f1';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(bowGripX, -bowTipY);
        ctx.lineTo(stringPlaneX - dist, 0);
        ctx.lineTo(bowGripX, bowTipY);
        ctx.stroke();

        // Draw loaded arrow if dragging
        if (isDragging && arrow === null) {
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(stringPlaneX - dist, 0); 
            ctx.lineTo(stringPlaneX - dist + ARROW_LENGTH, 0); 
            ctx.stroke();
            
            ctx.fillStyle = '#333333';
            ctx.beginPath();
            const tipX = stringPlaneX - dist + ARROW_LENGTH;
            ctx.moveTo(tipX + 5, 0);
            ctx.lineTo(tipX - 10, 6);
            ctx.lineTo(tipX - 10, -6);
            ctx.fill();

            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            const fletchX = stringPlaneX - dist + 15;
            ctx.beginPath();
            ctx.moveTo(fletchX + 10, -3); ctx.lineTo(fletchX + 5, 0); ctx.lineTo(fletchX + 10, 3);
            ctx.moveTo(fletchX + 3, -3); ctx.lineTo(fletchX - 2, 0); ctx.lineTo(fletchX + 3, 3);
            ctx.stroke();
        }

        // Front Hand holding the bow
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(bowGripX, handY, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore(); // end bow assembly

        // 10. Back Hand holding the string (drawn last so it covers the string)
        if (isDragging && arrow === null) {
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(pullX, pullY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore(); // end archer
    }

    function drawArrow(x, y, angle, pullDist = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Fixed length, longer than max pull distance (70)

        // Arrow Shaft
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(ARROW_LENGTH, 0);
        ctx.stroke();

        // Fletching
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2; // Thinner

        // Feather 1
        ctx.beginPath();
        ctx.moveTo(25, -3);
        ctx.lineTo(20, 0);
        ctx.lineTo(25, 3);
        ctx.stroke();

        // Feather 2
        ctx.beginPath();
        ctx.moveTo(18, -3);
        ctx.lineTo(13, 0);
        ctx.lineTo(18, 3);
        ctx.stroke();
        
        // Feather 3
        ctx.beginPath();
        ctx.moveTo(11, -3);
        ctx.lineTo(6, 0);
        ctx.lineTo(11, 3);
        ctx.stroke();

        // Arrowhead
        ctx.fillStyle = '#333333';
        ctx.beginPath();
        ctx.moveTo(ARROW_LENGTH + 5, 0);
        ctx.lineTo(ARROW_LENGTH - 10, 7);
        ctx.lineTo(ARROW_LENGTH - 10, -7);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }

    function drawEnemy(x, y){
      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(x, y, enemy.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x - 7, y - 5, 5, 0, Math.PI * 2);
      ctx.arc(x + 7, y - 5, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(x - 7, y - 5, 2, 0, Math.PI * 2);
      ctx.arc(x + 7, y - 5, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'black';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 10, y + 10);
      ctx.lineTo(x + 10, y + 10);
      ctx.stroke();
    }

    function distance(x1, y1, x2, y2){
      return Math.sqrt((x2 - x1)**2 + (y2 - y1)**2);
    }

    function startGame(){
      score = 0;
      timeLeft = 60;
      gameRunning = true;
      arrow = null;
      spawnEnemy();
      updateInfo();
      startBtn.style.display = 'none';
      restartBtn.style.display = 'none';

      timerId = setInterval(() => {
        if(isPaused) return;
        timeLeft--;
        updateInfo();
        if(timeLeft <= 0){
          endGame();
        }
      }, 1000);

      gameLoop();
    }

    function endGame(){
      gameRunning = false;
      clearInterval(timerId);
      arrow = null;
      enemy = null;
      updateInfo();
      alert(`遊戲結束！你的分數是：${score}`);
      restartBtn.style.display = 'inline-block';
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      restartBtn.style.display = 'none';
      startGame();
    });
  </script>
</body>
</html>
