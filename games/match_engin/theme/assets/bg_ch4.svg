<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="storm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#34495e" />
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c3a21" />
      <stop offset="100%" stop-color="#3e2723" />
    </linearGradient>
  </defs>

  <!-- Stormy sky outside window -->
  <rect width="800" height="400" fill="url(#storm)" />
  <!-- Lightning flash -->
  <polygon points="400,0 350,150 420,130 380,300" fill="#fff" opacity="0.3" />

  <!-- Rain -->
  <path d="M 50 0 L 20 200 M 150 0 L 120 250 M 250 -50 L 200 300 M 600 0 L 570 250 M 700 50 L 670 400" stroke="#7f8fa6" stroke-width="2" opacity="0.5" stroke-dasharray="20, 20" />
  
  <!-- Executive Window Frames -->
  <rect x="0" y="0" width="800" height="20" fill="#222" />
  <rect x="0" y="320" width="800" height="20" fill="#222" />
  <rect x="0" y="0" width="20" height="340" fill="#222" />
  <rect x="780" y="0" width="20" height="340" fill="#222" />
  <rect x="250" y="0" width="20" height="340" fill="#222" />
  <rect x="550" y="0" width="20" height="340" fill="#222" />

  <!-- Expensive Wood Desk -->
  <rect x="0" y="340" width="800" height="60" fill="url(#wood)" />
  <rect x="0" y="340" width="800" height="10" fill="#4e342e" />
  
  <!-- Plant in corner (Potted Plant) -->
  <path d="M 50 250 Q 20 200 40 180 Q 60 210 50 250 Z" fill="#2ecc71" opacity="0.8" />
  <path d="M 50 250 Q 80 180 100 190 Q 70 230 50 250 Z" fill="#27ae60" opacity="0.8" />
  <path d="M 50 250 Q 50 150 60 150 Q 65 200 50 250 Z" fill="#2ecc71" opacity="0.9" />
  <!-- Pot -->
  <polygon points="30,250 70,250 60,340 40,340" fill="#7f8c8d" />

  <!-- Desk Nameplate -->
  <polygon points="350,345 450,345 460,365 340,365" fill="#d4af37" />
  <rect x="345" y="348" width="110" height="14" fill="#111" />
  <text x="400" y="358" font-family="Times New Roman" font-size="10" fill="#d4af37" text-anchor="middle">MANAGER</text>

  <!-- Laptop (high end) -->
  <polygon points="550,340 650,340 670,360 530,360" fill="#bdc3c7" />
  <rect x="560" y="290" width="80" height="50" rx="3" fill="#95a5a6" />
  <rect x="565" y="295" width="70" height="40" fill="#2c3e50" />
</svg>
