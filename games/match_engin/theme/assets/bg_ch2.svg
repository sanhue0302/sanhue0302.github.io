<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#192a56" />
      <stop offset="100%" stop-color="#273c75" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#night)" />
  
  <!-- Overtime dark office, raining outside -->
  <rect x="0" y="0" width="800" height="400" fill="#000" opacity="0.6" />
  
  <!-- Raining streaks -->
  <path d="M 100 0 L 80 150 M 200 -50 L 170 300 M 500 50 L 480 400 M 700 0 L 670 250 M 600 -20 L 570 300" stroke="#fff" stroke-width="1" opacity="0.1" stroke-dasharray="10, 15" />

  <!-- The only desk light -->
  <polygon points="300,-50 500,-50 650,400 150,400" fill="#f1c40f" opacity="0.15" />
  <rect x="350" y="-10" width="100" height="20" fill="#2c3e50" rx="3" />
  <rect x="360" y="10" width="80" height="10" fill="#f1c40f" filter="url(#glow)" />

  <!-- Messy Desk -->
  <path d="M0 320 L800 320 L800 400 L0 400 Z" fill="#2d3436" />
  
  <!-- Stacks of documents -->
  <rect x="150" y="270" width="80" height="10" fill="#fff" rx="1" />
  <rect x="152" y="280" width="76" height="10" fill="#ecf0f1" rx="1" />
  <rect x="148" y="290" width="82" height="10" fill="#fff" rx="1" />
  <rect x="155" y="300" width="78" height="10" fill="#bdc3c7" rx="1" />
  <rect x="150" y="310" width="80" height="10" fill="#fff" rx="1" />

  <!-- High pile -->
  <rect x="600" y="150" width="70" height="170" fill="#fff" opacity="0.9" rx="2" />
  <line x1="600" y1="180" x2="670" y2="180" stroke="#ccc" stroke-width="2" />
  <line x1="600" y1="220" x2="670" y2="220" stroke="#ccc" stroke-width="2" />
  <line x1="600" y1="280" x2="670" y2="280" stroke="#ccc" stroke-width="2" />
  <line x1="600" y1="300" x2="670" y2="300" stroke="#ccc" stroke-width="2" />

  <!-- Post-it notes on the wall -->
  <rect x="250" y="120" width="30" height="30" fill="#ff7675" transform="rotate(-10 265 135)" />
  <rect x="300" y="150" width="30" height="30" fill="#fdcb6e" transform="rotate(5 315 165)" />
  <rect x="520" y="100" width="30" height="30" fill="#55efc4" transform="rotate(-5 535 115)" />
  <rect x="550" y="160" width="30" height="30" fill="#74b9ff" transform="rotate(15 565 175)" />

  <!-- Red glowing eyes in the dark corner (bugs/pressure) -->
  <circle cx="750" cy="280" r="3" fill="#e84118" filter="url(#glow)" />
  <circle cx="770" cy="280" r="3" fill="#e84118" filter="url(#glow)" />

  <!-- Monitor glowing -->
  <rect x="340" y="210" width="120" height="80" rx="4" fill="#000" stroke="#333" stroke-width="4" />
  <rect x="345" y="215" width="110" height="70" fill="#c23616" opacity="0.4" filter="url(#glow)" />
  <text x="400" y="255" font-family="Arial" font-size="14" fill="#ff7979" text-anchor="middle" font-weight="bold">ERROR 404</text>
  <rect x="390" y="290" width="20" height="30" fill="#2d3436" />
</svg>
