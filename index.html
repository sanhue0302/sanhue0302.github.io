<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title and meta tags will be injected by main.js -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Fixed Header Bar -->
  <header id="header-bar">
    <div class="header-left">
      <a href="#" id="header-logo" class="header-logo">Sanhue0302</a>
    </div>
    <nav id="header-nav"></nav>
    <div class="header-right">
      <button id="mobile-nav-toggle" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <!-- Mobile Nav Overlay -->
  <div id="mobile-nav-overlay"></div>
  <div id="mobile-nav-drawer">
    <div class="drawer-header">
      <span>Menu</span>
      <button id="drawer-close-btn" aria-label="Close menu"><i class="fas fa-times"></i></button>
    </div>
    <ul id="mobile-nav-list"></ul>
  </div>

  <!-- Floating Game Menu Button (visible only in game mode) -->
  <div id="game-fab" class="game-fab hidden">
    <button id="game-fab-btn" aria-label="Menu">
      <i class="fas fa-gamepad"></i>
    </button>
    <div id="game-fab-panel" class="game-fab-panel hidden">
      <button id="fab-back-btn" class="fab-action-btn">
        <i class="fas fa-arrow-left"></i>
        <span>回首頁</span>
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div id="content">
    <iframe name="showcase"></iframe>
    <footer id="site-footer">
      <p>&copy; 2025 Sanhue0302 &middot; Powered by AI collaboration.</p>
    </footer>
  </div>

  <script src="assets/js/seo-data.js"></script>
  <script src="assets/js/menu-data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
